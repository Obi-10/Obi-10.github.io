  <main>
  <section id="data-visualization">
    <h2>Meditation Data Analysis</h2>
    <figure>
        <figcaption style="text-align:center; font-size:15px; color:#555; margin-bottom:12px;">
          This chart compares the strength of scientific evidence for several commonly reported benefits of meditation. Each
          bar represents one benefit, and the height shows the evidence strength based on research support on a scale from 0 to 4. Hovering over the 
          bars also displays the evidence strength.  
        </figcaption>

      <!-- Plotly chart will be drawn here -->
       <div id="meditationChart"></div>
      </figure>
  </section>

<script>
  // -----------------------------
  // Plotly Data Visualization
  // Based on Information Is Beautiful Dataset
  // -----------------------------
  Papa.parse("meditationData.csv", {
    download: true,
    header: true,
    complete: function (results) {
      const rows = results.data;

      const benefits = rows.map(r => r.benefit);
      const strengths = rows.map(r => Number(r.evidence_strength));

      const data = [{
        type: "bar",
        x: benefits,
        y: strengths,
        marker: {
          color: "#1abc9c"
        }
      }];
        // Fix: Determine title text, font size, and padding dynamically based on screen width
        const isMobile = window.innerWidth < 600;
        const chartTitle = isMobile ? "Strength of Evidence<br>for Meditation Benefits" : "Strength of Evidence for Meditation Benefits";
        const chartTitleSize = isMobile ? 14 : 18;
        const chartTopMargin = isMobile ? 90 : 60;
                const layout = {
          // Fix: Wrap title onto two rows and scale font down so it never clips into margins
          title: {
            text: "Strength of Evidence<br>for Meditation Benefits",
            font: { 
              size: 14, /* Reduced from 18 to keep text perfectly legible on small screen sizes */
              color: "#2c3e50" 
            },
            x: 0.5,
            xanchor: "center",
            xref: "paper"
          },
          paper_bgcolor: "#ffffff",
          plot_bgcolor: "#fafafa",
          yaxis: { 
            title: "Evidence Strength (0 = None, 4 = Strong)", 
            range: [0, 4], 
            gridcolor: "#ddd", 
            automargin: true 
          },
          xaxis: { 
            tickangle: -90, 
            tickfont: { size: 16 }, 
            automargin: true 
          },
          // Fix: Increase the top margin padding slightly to give the 2-line title more breathing room
          margin: { t: 90, l: 50, r: 30, b: 160 }
        };



      Plotly.newPlot(
        "meditationChart",
        data,
        layout,
        { responsive: true }
      );
    }
  });
  
</script>
