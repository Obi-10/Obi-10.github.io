  <main>
  <section id="data-visualization">
    <h2>Meditation Data Analysis</h2>
    <figure>
        <figcaption style="text-align:center; font-size:15px; color:#555; margin-bottom:12px;">
          This chart compares the strength of scientific evidence for several commonly reported benefits of meditation. Each
          bar represents one benefit, and the height shows the evidence strength based on research support on a scale from 0 to 4. Hovering over the 
          bars also displays the evidence strength.  
        </figcaption>

      <!-- Plotly chart will be drawn here -->
       <div id="meditationChart"></div>
      </figure>
  </section>

<script>
  // -----------------------------
  // Plotly Data Visualization
  // Based on Information Is Beautiful Dataset
  // -----------------------------
  Papa.parse("meditationData.csv", {
    download: true,
    header: true,
    complete: function (results) {
      const rows = results.data;

      const benefits = rows.map(r => r.benefit);
      const strengths = rows.map(r => Number(r.evidence_strength));

      const data = [{
        type: "bar",
        x: benefits,
        y: strengths,
        marker: {
          color: "#1abc9c"
        }
      }];

        const layout = {
          // Fix: Center the title text horizontally so it never clips off-screen
          title: {
            text: "Strength of Evidence for Meditation Benefits",
            font: { size: 18, color: "#2c3e50" },
            x: 0.5,
            xanchor: "center"
          },
          paper_bgcolor: "#ffffff",
          plot_bgcolor: "#fafafa",
          yaxis: { 
            title: "Evidence Strength (0 = None, 4 = Strong)", 
            range: [0, 4], 
            gridcolor: "#ddd", 
            automargin: true 
          },
          // Fix: Shift the labels to a clean vertical -90 angle so they stay separated on mobile
          xaxis: { 
            tickangle: -90, 
            tickfont: { size: 11 }, 
            automargin: true 
          },
          // Fix: Open up extra padding on the bottom margin container for vertical labels
          margin: { t: 80, l: 50, r: 30, b: 160 }
        };


      Plotly.newPlot(
        "meditationChart",
        data,
        layout,
        { responsive: true }
      );
    }
  });
  
</script>
